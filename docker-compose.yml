# ============================================================
# DOCKER COMPOSE — Store Sales Forecasting System
# ============================================================
# Usage:
#   docker compose up --build       ← start everything
#   docker compose up api           ← API only
#   docker compose up dashboard     ← Dashboard only
#   docker compose down             ← stop
# ============================================================

version: "3.9"

services:

  api:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     runtime
    container_name: store_sales_api
    ports:
      - "8000:8000"
    volumes:
      - ./forecast_models:/app/forecast_models
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

  dashboard:
    build:
      context:    .
      dockerfile: Dockerfile.dashboard
    container_name: store_sales_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./forecast_models:/app/forecast_models
      - ./logs:/app/logs
    environment:
      - FORECAST_API_URL=http://api:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
